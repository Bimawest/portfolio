<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    /* ABOUT GRID */
    /* Container gambar untuk posisi relatif */
    .img-container {
        position: relative;
        display: flex;
        justify-content: center;
        /* Memastikan gambar di tengah secara horizontal */
        align-items: center;
        /* Memastikan gambar di tengah secara vertikal */
        overflow: hidden;
        border-radius: 10px;
        /* Samakan dengan border-radius img */
    }

    /* Penyesuaian gambar agar pas di container */
    .img-container img {
        display: block;
        width: 100%;
        height: auto;
    }

    /* Layer Abu-abu Transparan & Tulisan Licency */
    .overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(255, 255, 255, 0.6);
        /* Abu-abu 50% transparan */
        color: black;
        font-weight: bold;
        font-size: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        pointer-events: none;
        /* Agar klik tetap menembus ke gambar jika perlu */
        text-transform: uppercase;
        letter-spacing: 2px;
    }

    .section container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 2rem;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 1rem;
        margin-top: 1.5rem;
    }

    .card {
        background: #fb8d19;
        padding: 1.2rem;
        border-radius: 10px;
        box-shadow: var(--shadow);
        text-align: center;
        transition: transform .25s ease, box-shadow .25s ease;
        border: 1px solid rgba(0, 0, 0, 1);
    }

    .section-title h1 {
        display: flex;
        align-items: center;
        justify-content: center;
    }

    img {
        width: 100%;
        height: auto;
        border: 2px solid rgba(0, 0, 0, 1);
        border-radius: 10px;
    }
</style>

<body>
    <!-- ABOUT -->
    <section id="about" class="section container">
        <div class="section-title">
            <h1>My Design</h1>
            <p></p>
            <div class="line"></div>
        </div>

        <div class="grid">
            <div class="card">
                <h1>design1</h1>
                <div class="img-container">
                    <img src="travel.png" alt="design1">
                    <div class="overlay">Licency</div>
                </div>
            </div>

            <div class="card">
                <h1>design2</h1>
                <div class="img-container">
                    <img src="naskun.jpg" alt="design2">
                    <div class="overlay">Licency</div>
                </div>
            </div>

            <div class="card">
                <h1>design3</h1>
                <div class="img-container">
                    <img src="building.png" alt="design3">
                    <div class="overlay">Licency</div>
                </div>
            </div>

            <div class="card">
                <h1>design4</h1>
                <div class="img-container">
                    <img src="" alt="design4">
                    <div class="overlay">Licency</div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
